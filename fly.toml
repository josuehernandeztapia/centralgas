# ============================================================
# fly.toml — Central Gas Agent (Phase 1)
# ============================================================
# Deploy:    fly deploy
# Logs:      fly logs
# SSH:       fly ssh console
# Status:    fly status
# Scale:     fly scale count 1 / fly scale memory 2048
# ============================================================

app = "central-gas-agent"
primary_region = "dfw"   # Dallas, TX — closest Fly region to Aguascalientes (~60-80ms).
                          # Fly does NOT have a Querétaro/MX datacenter (corrected from qro).
kill_signal = "SIGTERM"
kill_timeout = "30s"

# ---------- BUILD ----------
[build]
  dockerfile = "Dockerfile"

# ---------- ENV (non-secret) ----------
[env]
  LOG_LEVEL = "info"
  API_HOST = "0.0.0.0"
  API_PORT = "8000"
  CLAUDE_MODEL = "claude-sonnet-4-5"
  WHATSAPP_PROVIDER = "twilio"
  # All sensitive values come from `fly secrets set` (DATABASE_URL, ANTHROPIC_API_KEY, etc.)

# ---------- HTTP SERVICE ----------
# The FastAPI app is the only public-facing service.
# Wrapper + worker run inside the same VM as background processes (Phase 1).
# When traffic justifies, split worker into its own fly app (Phase 2).
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true       # Stop when idle to save money
  auto_start_machines = true       # Start on incoming request
  min_machines_running = 0         # Phase 1: 0 (cold-start OK for manual uploads)
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

# ---------- HEALTH CHECK ----------
[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"
  protocol = "http"

# ---------- PROCESSES ----------
# Single 'app' process for Phase 1 (api only). When SCADA / wrapper come online
# we'll add a separate 'worker' process here so they scale independently.
[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

# ---------- VM RESOURCES ----------
# shared-cpu-1x@1024 = ~$3.50/mo when always-on; less with auto-stop.
# Phase 1 traffic is near zero — auto-stop keeps cost minimal.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# ---------- METRICS ----------
[metrics]
  port = 9091
  path = "/metrics"
