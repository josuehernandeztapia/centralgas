    // ====================================================
    // Resumen tab
    // ====================================================
    function ResumenTab({ onStationClick, onPlacaClick }) {
      const [stats, setStats] = useState(null);
      const [err, setErr] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        apiGet('/stats').then(setStats).catch(setErr).finally(() => setLoading(false));
      }, []);

      if (loading) return <LoadingBlock text="Cargando métricas…" />;
      if (err) return <ErrorBlock error={err} />;
      if (!stats) return null;

      const byDay = [...(stats.by_day || [])].reverse();
      const byEstacion = (stats.by_estacion || []).slice(0, 10);
      const byMedio = stats.by_medio_pago || [];

      const avgTicket = stats.total_transactions ? stats.total_mxn / stats.total_transactions : 0;
      const avgLitros = stats.total_transactions ? stats.total_litros / stats.total_transactions : 0;

      return (
        <div className="space-y-6">
          {/* KPI row principal */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <Kpi label="Transacciones" value={num(stats.total_transactions)} sub={stats.date_range?.days ? `${stats.date_range.days} días de datos` : ''} variant="cyan" />
            <Kpi label="Litros (LEQ)" value={num(stats.total_litros, 0)} sub={`≈ ${num(stats.total_kg, 0)} kg`} variant="verde" />
            <Kpi label="Revenue" value={mxn(stats.total_mxn)} sub={`IVA: ${mxn(stats.total_iva)}`} variant="purple" />
            <Kpi label="Sobreprecio capturado" value={mxn(stats.total_sobreprecio)} sub={`Ticket prom: ${mxn(avgTicket)}`} variant="amber" />
          </div>

          {/* Secondary row */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <Card title="Periodo">
              <div className="text-sm text-white/80">
                <div>Del <strong className="text-white">{datefmt(stats.date_range?.min)}</strong></div>
                <div>Al <strong className="text-white">{datefmt(stats.date_range?.max)}</strong></div>
              </div>
            </Card>
            <Card title="Carga promedio">
              <div className="font-display text-2xl font-bold text-white font-tabular">
                {num(avgLitros, 1)} <span className="text-sm font-normal text-white/50">LEQ</span>
              </div>
              <div className="text-[11px] text-white/50 mt-1">ticket prom: {mxn(avgTicket)}</div>
            </Card>
            <Card title="Medios de pago">
              <div className="text-sm text-white/80 space-y-1">
                {byMedio.slice(0, 3).map((m, i) => (
                  <div key={i} className="flex justify-between">
                    <span className="truncate max-w-[120px]">{prettifyMedio(m.medio_pago)}</span>
                    <strong className="text-cyan-300 font-tabular">{m.pct}%</strong>
                  </div>
                ))}
              </div>
            </Card>
            <Card title="Segmento vehículo">
              <div className="text-sm text-white/80 space-y-1">
                {(stats.by_segmento || []).slice(0, 4).map((s, i) => (
                  <div key={i} className="flex justify-between">
                    <span className="truncate max-w-[120px]">{s.segmento === 'SIN_DATOS' ? 'Sin datos' : s.segmento}</span>
                    <strong className="text-cyan-300 font-tabular">{s.pct}%</strong>
                  </div>
                ))}
              </div>
            </Card>
          </div>

          {/* Charts */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <Card title="Ventas últimos 30 días con datos" subtitle={`${byDay.length} días`}>
              {byDay.length === 0 ? (
                <div className="text-white/40 text-sm py-8 text-center">Sin datos</div>
              ) : (
                <ResponsiveContainer width="100%" height={260}>
                  <LineChart data={byDay} margin={{ top: 5, right: 20, bottom: 5, left: 0 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,174,239,0.1)" />
                    <XAxis dataKey="day" {...axisStyle} tickFormatter={(d) => {
                      const x = new Date(d); return `${x.getDate()}/${x.getMonth()+1}`;
                    }} />
                    <YAxis yAxisId="left"  {...axisStyle} />
                    <YAxis yAxisId="right" orientation="right" {...axisStyle} />
                    <Tooltip
                      {...tooltipStyle}
                      formatter={(value, name) => {
                        if (name === 'Litros')  return [num(value, 0) + ' LEQ', name];
                        if (name === 'Revenue') return [mxn(value), name];
                        return [value, name];
                      }}
                      labelFormatter={(d) => `Día ${d}`}
                    />
                    <Legend wrapperStyle={{ color: 'rgba(255,255,255,0.7)', fontSize: '12px' }} />
                    <Line yAxisId="left"  type="monotone" dataKey="litros" stroke={BRAND.cyan}  name="Litros"  dot={false} strokeWidth={2} />
                    <Line yAxisId="right" type="monotone" dataKey="mxn"    stroke={BRAND.verde} name="Revenue" dot={false} strokeWidth={2} />
                  </LineChart>
                </ResponsiveContainer>
              )}
            </Card>

            <Card title="Top 10 estaciones" subtitle="click para detalle">
              {byEstacion.length === 0 ? (
                <div className="text-white/40 text-sm py-8 text-center">Sin datos</div>
              ) : (
                <ResponsiveContainer width="100%" height={320}>
                  <BarChart data={byEstacion} layout="vertical" margin={{ top: 5, right: 20, bottom: 5, left: 150 }}
                    onClick={(e) => { if (e?.activePayload?.[0]?.payload?.station_natgas) onStationClick(e.activePayload[0].payload.station_natgas); }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,174,239,0.1)" />
                    <XAxis type="number" {...axisStyle} tickFormatter={(n) => num(n, 0)} />
                    <YAxis
                      type="category"
                      dataKey="station_natgas"
                      {...axisStyle}
                      width={140}
                      tickFormatter={(name) => truncate(name, 20)}
                    />
                    <Tooltip {...tooltipStyle} formatter={(v) => [num(v, 0) + ' LEQ', 'Litros']} labelFormatter={(l) => l} />
                    <Bar dataKey="litros" radius={[0, 4, 4, 0]} style={{ cursor: 'pointer' }}>
                      {byEstacion.map((e, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              )}
            </Card>
          </div>
        </div>
      );
    }

    // ====================================================
    // Transacciones tab
    // ====================================================
    function TxnTab() {
      const [limit] = useState(50);
      const [offset, setOffset] = useState(0);
      const [filters, setFilters] = useState({ estacion: '', placa: '', date_from: '', date_to: '' });
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState(null);

      const fetchPage = useCallback(async () => {
        setLoading(true); setErr(null);
        try {
          const qs = new URLSearchParams({ limit: String(limit), offset: String(offset) });
          if (filters.estacion) qs.set('estacion', filters.estacion);
          if (filters.placa) qs.set('placa', filters.placa);
          if (filters.date_from) qs.set('date_from', filters.date_from);
          if (filters.date_to) qs.set('date_to', filters.date_to);
          setData(await apiGet('/transactions?' + qs.toString()));
        } catch (e) { setErr(e); }
        finally { setLoading(false); }
      }, [limit, offset, filters]);

      useEffect(() => { fetchPage(); }, [fetchPage]);

      const applyFilters = (e) => { e.preventDefault(); setOffset(0); fetchPage(); };
      const clearFilters = () => { setFilters({ estacion: '', placa: '', date_from: '', date_to: '' }); setOffset(0); };

      const exportCsv = () => {
        // Build the same query string, hit /transactions.csv (browser re-uses Basic auth).
        const qs = new URLSearchParams();
        if (filters.estacion) qs.set('estacion', filters.estacion);
        if (filters.placa) qs.set('placa', filters.placa);
        if (filters.date_from) qs.set('date_from', filters.date_from);
        if (filters.date_to) qs.set('date_to', filters.date_to);
        const url = API_BASE + '/transactions.csv' + (qs.toString() ? '?' + qs.toString() : '');
        window.location.href = url;
      };

      const page = Math.floor(offset / limit) + 1;
      const totalPages = data ? Math.ceil((data.total || 0) / limit) : 0;

      const inputCls = 'bg-azul-dark/50 border border-cyan-brand/20 text-white placeholder-white/30 px-3 py-2 rounded text-sm focus:border-cyan-brand/60 focus:outline-none';

      return (
        <div className="space-y-4">
          <Card title="Filtros">
            <form onSubmit={applyFilters} className="grid grid-cols-1 sm:grid-cols-5 gap-3">
              <input type="text" placeholder="Estación (ej: Nacozari)" className={inputCls}
                value={filters.estacion}
                onChange={e => setFilters({...filters, estacion: e.target.value})} />
              <input type="text" placeholder="Placa (ej: A12345A)" className={`${inputCls} uppercase`}
                value={filters.placa}
                onChange={e => setFilters({...filters, placa: e.target.value.toUpperCase()})} />
              <input type="date" className={inputCls}
                value={filters.date_from}
                onChange={e => setFilters({...filters, date_from: e.target.value})} />
              <input type="date" className={inputCls}
                value={filters.date_to}
                onChange={e => setFilters({...filters, date_to: e.target.value})} />
              <div className="flex gap-2">
                <button type="submit" className="flex-1 bg-gradient-to-br from-cyan-brand to-verde-brand hover:opacity-90 text-azul-dark text-sm font-semibold py-2 px-3 rounded transition">Aplicar</button>
                <button type="button" onClick={clearFilters} className="bg-white/5 hover:bg-white/10 border border-white/10 text-white/70 text-sm font-medium py-2 px-3 rounded transition">Limpiar</button>
              </div>
            </form>
          </Card>

          <Card
            title="Transacciones"
            subtitle={data ? `${num(data.total || 0)} resultados · página ${page} de ${totalPages || 1}` : ''}
            titleAction={
              <button
                type="button"
                onClick={exportCsv}
                disabled={!data || !data.total}
                title="Exportar el resultado filtrado a CSV"
                className="text-[11px] font-semibold uppercase tracking-wider bg-cyan-brand/10 hover:bg-cyan-brand/20 border border-cyan-brand/40 text-cyan-300 px-3 py-1.5 rounded transition disabled:opacity-40 disabled:cursor-not-allowed"
              >
                ↓ Export CSV
              </button>
            }
          >
            {loading && <LoadingBlock />}
            {err && <ErrorBlock error={err} />}
            {!loading && !err && data && (
              <>
                <div className="overflow-x-auto -mx-5">
                  <table className="min-w-full text-sm">
                    <thead>
                      <tr>
                        <th className="px-3 py-2 text-left font-semibold text-white/70 text-[11px] uppercase tracking-wider">Fecha</th>
                        <th className="px-3 py-2 text-left font-semibold text-white/70 text-[11px] uppercase tracking-wider">Estación</th>
                        <th className="px-3 py-2 text-left font-semibold text-white/70 text-[11px] uppercase tracking-wider">Placa</th>
                        <th className="px-3 py-2 text-right font-semibold text-white/70 text-[11px] uppercase tracking-wider">Litros</th>
                        <th className="px-3 py-2 text-right font-semibold text-white/70 text-[11px] uppercase tracking-wider">PVP</th>
                        <th className="px-3 py-2 text-right font-semibold text-white/70 text-[11px] uppercase tracking-wider">Total</th>
                        <th className="px-3 py-2 text-right font-semibold text-white/70 text-[11px] uppercase tracking-wider">Sobreprecio/LEQ</th>
                        <th className="px-3 py-2 text-left font-semibold text-white/70 text-[11px] uppercase tracking-wider">Medio</th>
                      </tr>
                    </thead>
                    <tbody>
                      {(data.rows || []).map((r, i) => (
                        <tr key={r.id || i}>
                          <td className="px-3 py-2 whitespace-nowrap text-white/70 text-xs">{dtfmt(r.timestamp_local)}</td>
                          <td className="px-3 py-2 text-white/90 truncate max-w-[160px]" title={r.station_natgas}>{r.station_natgas || '—'}</td>
                          <td className="px-3 py-2 font-mono text-cyan-300 font-semibold">{r.placa}</td>
                          <td className="px-3 py-2 text-right font-tabular text-white">{num(r.litros, 2)}</td>
                          <td className="px-3 py-2 text-right font-tabular text-white/80">{mxn(r.pvp).replace('MX$', '$')}</td>
                          <td className="px-3 py-2 text-right font-tabular font-semibold text-white">{mxn(r.total_mxn)}</td>
                          <td className="px-3 py-2 text-right font-tabular text-amber-300">{r.recaudo_pagado ? mxn(r.recaudo_pagado) : '—'}</td>
                          <td className="px-3 py-2 text-white/60 text-xs">{prettifyMedio(r.medio_pago)}</td>
                        </tr>
                      ))}
                      {(data.rows || []).length === 0 && (
                        <tr><td colSpan="8" className="px-3 py-8 text-center text-white/40">Sin resultados</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>

                <div className="flex items-center justify-between mt-4 pt-4 border-t border-cyan-brand/10">
                  <div className="text-[11px] text-white/50">
                    Mostrando {offset + 1}-{Math.min(offset + limit, data.total)} de {num(data.total)}
                  </div>
                  <div className="flex gap-2">
                    <button
                      onClick={() => setOffset(Math.max(0, offset - limit))}
                      disabled={offset === 0}
                      className="px-3 py-1 text-sm bg-white/5 hover:bg-white/10 disabled:opacity-30 disabled:cursor-not-allowed rounded border border-white/10 text-white/70 transition"
                    >← Anterior</button>
                    <button
                      onClick={() => setOffset(offset + limit)}
                      disabled={offset + limit >= data.total}
                      className="px-3 py-1 text-sm bg-white/5 hover:bg-white/10 disabled:opacity-30 disabled:cursor-not-allowed rounded border border-white/10 text-white/70 transition"
                    >Siguiente →</button>
                  </div>
                </div>
              </>
            )}
          </Card>
        </div>
      );
    }

    // ====================================================
    // Sobreprecio tab
    // ====================================================
    function SobreprecioTab() {
      const [data, setData] = useState(null);
      const [err, setErr] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        apiGet('/sobreprecio/distribution').then(setData).catch(setErr).finally(() => setLoading(false));
      }, []);

      if (loading) return <LoadingBlock text="Calculando distribución…" />;
      if (err) return <ErrorBlock error={err} />;
      if (!data) return null;

      const stats = data.stats || {};
      const buckets = data.buckets || [];

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <Kpi label="Tx con sobreprecio" value={num(stats.n_nonzero)} sub={`de ${num(stats.n_total)} total`} variant="amber" />
            <Kpi label="Promedio / LEQ" value={`$${num(stats.mean, 2)}`} sub="(solo > 0)" variant="cyan" />
            <Kpi label="Mediana / LEQ" value={`$${num(stats.median, 2)}`} variant="verde" />
            <Kpi label="Max / LEQ" value={`$${num(stats.max, 2)}`} sub={`p99: $${num(stats.p99, 2)}`} variant="purple" />
          </div>

          <Card
            title="Distribución del sobreprecio por LEQ"
            subtitle={`${buckets.length} buckets · escala truncada en P99 ($${num(stats.p99, 2)})`}
          >
            {buckets.length === 0 ? (
              <div className="text-white/40 text-sm py-8 text-center">Sin datos de sobreprecio aún.</div>
            ) : (
              <>
                <ResponsiveContainer width="100%" height={320}>
                  <BarChart data={buckets} margin={{ top: 5, right: 20, bottom: 5, left: 0 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,174,239,0.1)" />
                    <XAxis dataKey="lower" {...axisStyle} tickFormatter={(v) => `$${num(v, 1)}`} />
                    <YAxis {...axisStyle} />
                    <Tooltip
                      {...tooltipStyle}
                      formatter={(v, _, props) => [`${num(v)} tx (${props.payload.pct}%)`, 'Cuenta']}
                      labelFormatter={(lo, arr) => {
                        const row = arr[0]?.payload;
                        if (!row) return '';
                        return row.upper == null
                          ? `≥ $${num(row.lower, 2)} (outliers)`
                          : `$${num(row.lower, 2)} – $${num(row.upper, 2)}`;
                      }}
                    />
                    <Bar dataKey="count" radius={[4, 4, 0, 0]}>
                      {buckets.map((b, i) => (
                        <Cell key={i} fill={b.upper == null ? BRAND.rojo : BRAND.amber} />
                      ))}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
                {buckets.some(b => b.upper == null) && (
                  <p className="text-[11px] text-white/50 mt-3">
                    <span className="inline-block w-2 h-2 bg-red-500 rounded-sm mr-1 align-middle"></span>
                    Bucket rojo: transacciones con sobreprecio &gt; P99 (outliers, posibles errores).
                  </p>
                )}
              </>
            )}
          </Card>

          <Card title="Estadísticos descriptivos">
            <dl className="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
              {[
                ['Mínimo', stats.min], ['P25', stats.p25], ['Mediana', stats.median], ['Promedio', stats.mean],
                ['P75', stats.p75], ['P90', stats.p90], ['P95', stats.p95], ['P99', stats.p99],
                ['Máximo', stats.max], ['Desv. Estd.', stats.stddev],
              ].map(([k, v]) => (
                <div key={k} className="border-l-2 border-amber-400/60 pl-3">
                  <dt className="text-[10px] uppercase text-white/50 font-medium tracking-wider">{k}</dt>
                  <dd className="font-display text-lg font-semibold text-white font-tabular">${num(v, 4)}</dd>
                </div>
              ))}
            </dl>
          </Card>
        </div>
      );
    }

    // ====================================================
    // Cartera CMU tab — recaudos derived from transactions
    // ====================================================
    function CmuTab() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [err, setErr] = useState(null);
      const [filters, setFilters] = useState({ date_from: '', date_to: '', placa: '' });

      const fetchData = useCallback(async () => {
        setLoading(true); setErr(null);
        try {
          const qs = new URLSearchParams();
          if (filters.date_from) qs.set('date_from', filters.date_from);
          if (filters.date_to) qs.set('date_to', filters.date_to);
          if (filters.placa) qs.set('placa', filters.placa);
          qs.set('limit', '200');
          setData(await apiGet('/api/recaudos?' + qs.toString()));
        } catch (e) { setErr(e); }
        finally { setLoading(false); }
      }, [filters]);

      useEffect(() => { fetchData(); }, [fetchData]);

      const applyFilters = (e) => { e.preventDefault(); fetchData(); };
      const clearFilters = () => { setFilters({ date_from: '', date_to: '', placa: '' }); };

      const exportCsv = () => {
        const qs = new URLSearchParams();
        if (filters.date_from) qs.set('date_from', filters.date_from);
        if (filters.date_to) qs.set('date_to', filters.date_to);
        if (filters.placa) qs.set('placa', filters.placa);
        window.location.href = API_BASE + '/api/recaudos.csv' + (qs.toString() ? '?' + qs.toString() : '');
      };

      const kpis = data?.kpis || {};
      const byPlaca = (data?.by_placa || []).slice(0, 50);
      const byDay = (data?.by_day || []).slice().reverse();
      const inputCls = 'bg-azul-dark/50 border border-cyan-brand/20 text-white placeholder-white/30 px-3 py-2 rounded text-sm focus:border-cyan-brand/60 focus:outline-none';

      return (
        <div className="space-y-4">
          <Card title="Filtros Cartera CMU">
            <form onSubmit={applyFilters} className="grid grid-cols-1 sm:grid-cols-4 gap-3">
              <input type="text" placeholder="Placa (ej: A05219A)" className={`${inputCls} uppercase`}
                value={filters.placa}
                onChange={e => setFilters({...filters, placa: e.target.value.toUpperCase()})} />
              <input type="date" className={inputCls}
                value={filters.date_from}
                onChange={e => setFilters({...filters, date_from: e.target.value})} />
              <input type="date" className={inputCls}
                value={filters.date_to}
                onChange={e => setFilters({...filters, date_to: e.target.value})} />
              <div className="flex gap-2">
                <button type="submit" className="flex-1 bg-gradient-to-br from-cyan-brand to-verde-brand hover:opacity-90 text-azul-dark text-sm font-semibold py-2 px-3 rounded transition">Aplicar</button>
                <button type="button" onClick={clearFilters} className="bg-white/5 hover:bg-white/10 border border-white/10 text-white/70 text-sm font-medium py-2 px-3 rounded transition">Limpiar</button>
              </div>
            </form>
          </Card>

          {loading && <LoadingBlock />}
          {err && <ErrorBlock error={err} />}
          {!loading && !err && data && (
            <>
              {/* KPIs */}
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                <Kpi label="Placas activas" value={kpis.placas_activas || 0} variant="cyan" />
                <Kpi label="Total litros CMU" value={num(kpis.total_litros || 0)} sub="LEQ despachados" variant="verde" />
                <Kpi label="Total recaudado" value={'$' + num(kpis.total_recaudado || 0)} sub="litros × tarifa" variant="amber" />
                <Kpi label="Tarifa promedio" value={'$' + num(kpis.tarifa_promedio || 0, 2) + '/LEQ'} sub={kpis.fecha_min ? `${kpis.fecha_min} → ${kpis.fecha_max}` : ''} variant="purple" />
              </div>

              {/* By placa table */}
              <Card
                title="Desglose por placa"
                subtitle={`Top ${byPlaca.length} placas por recaudo (de ${num(kpis.placas_activas || 0)} activas)`}
                titleAction={
                  <button type="button" onClick={exportCsv} disabled={!data?.total}
                    className="text-[11px] font-semibold uppercase tracking-wider bg-cyan-brand/10 hover:bg-cyan-brand/20 border border-cyan-brand/40 text-cyan-300 px-3 py-1.5 rounded transition disabled:opacity-40 disabled:cursor-not-allowed">
                    ↓ Export CSV
                  </button>
                }
              >
                <div className="overflow-x-auto -mx-5">
                  <table className="min-w-full text-sm">
                    <thead>
                      <tr>
                        <th className="px-3 py-2 text-left font-semibold text-white/70 text-[11px] uppercase tracking-wider">Placa</th>
                        <th className="px-3 py-2 text-left font-semibold text-white/70 text-[11px] uppercase tracking-wider">Conductor</th>
                        <th className="px-3 py-2 text-right font-semibold text-white/70 text-[11px] uppercase tracking-wider">Cargas</th>
                        <th className="px-3 py-2 text-right font-semibold text-white/70 text-[11px] uppercase tracking-wider">Litros</th>
                        <th className="px-3 py-2 text-right font-semibold text-white/70 text-[11px] uppercase tracking-wider">Tarifa/LEQ</th>
                        <th className="px-3 py-2 text-right font-semibold text-white/70 text-[11px] uppercase tracking-wider">Total recaudado</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-white/5">
                      {byPlaca.map((p, i) => (
                        <tr key={i} className="hover:bg-white/5 transition">
                          <td className="px-3 py-2 font-mono text-cyan-300 font-semibold">{p.placa || '—'}</td>
                          <td className="px-3 py-2 text-white/80 truncate max-w-[200px]">{p.nombre || '—'}</td>
                          <td className="px-3 py-2 text-right font-tabular text-white/90">{num(p.cargas || 0)}</td>
                          <td className="px-3 py-2 text-right font-tabular text-white/90">{num(p.litros || 0)}</td>
                          <td className="px-3 py-2 text-right font-tabular text-amber-300">${num(p.tarifa_leq || 0, 2)}</td>
                          <td className="px-3 py-2 text-right font-tabular font-semibold text-emerald-300">${num(p.total_recaudado || 0)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </Card>

              {/* By day chart */}
              {byDay.length > 0 && (
                <Card title="Recaudo diario" subtitle="Últimos 60 días con data">
                  <div style={{ width: '100%', height: 280 }}>
                    <ResponsiveContainer>
                      <BarChart data={byDay} margin={{ top: 5, right: 5, bottom: 5, left: 5 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,174,239,0.08)" />
                        <XAxis dataKey="dia" {...axisStyle} tick={{ ...axisStyle.tick, fontSize: 9 }} angle={-45} textAnchor="end" height={60} />
                        <YAxis yAxisId="left" {...axisStyle} />
                        <YAxis yAxisId="right" orientation="right" {...axisStyle} />
                        <Tooltip {...tooltipStyle} />
                        <Bar yAxisId="left" dataKey="recaudado" name="Recaudado $" fill={BRAND.verde} radius={[3, 3, 0, 0]} />
                        <Bar yAxisId="right" dataKey="litros" name="Litros" fill={BRAND.cyan} radius={[3, 3, 0, 0]} opacity={0.5} />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </Card>
              )}

              {/* Detail rows */}
              <Card title="Detalle transacciones CMU" subtitle={`${num(data.total)} registros con recaudo`}>
                <div className="overflow-x-auto -mx-5">
                  <table className="min-w-full text-sm">
                    <thead>
                      <tr>
                        <th className="px-3 py-2 text-left font-semibold text-white/70 text-[11px] uppercase tracking-wider">Fecha</th>
                        <th className="px-3 py-2 text-left font-semibold text-white/70 text-[11px] uppercase tracking-wider">Placa</th>
                        <th className="px-3 py-2 text-left font-semibold text-white/70 text-[11px] uppercase tracking-wider">Conductor</th>
                        <th className="px-3 py-2 text-left font-semibold text-white/70 text-[11px] uppercase tracking-wider">Estación</th>
                        <th className="px-3 py-2 text-right font-semibold text-white/70 text-[11px] uppercase tracking-wider">Litros</th>
                        <th className="px-3 py-2 text-right font-semibold text-white/70 text-[11px] uppercase tracking-wider">Tarifa</th>
                        <th className="px-3 py-2 text-right font-semibold text-white/70 text-[11px] uppercase tracking-wider">Recaudo</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-white/5">
                      {(data.rows || []).slice(0, 100).map((r, i) => (
                        <tr key={i} className="hover:bg-white/5 transition">
                          <td className="px-3 py-2 text-white/70 text-xs whitespace-nowrap">{r.fecha_venta || '—'}</td>
                          <td className="px-3 py-2 font-mono text-cyan-300">{r.placa || '—'}</td>
                          <td className="px-3 py-2 text-white/80 truncate max-w-[180px] text-xs">{r.conductor || '—'}</td>
                          <td className="px-3 py-2 text-white/70 text-xs">{truncate(r.estacion || '', 20)}</td>
                          <td className="px-3 py-2 text-right font-tabular text-white/90">{num(r.litros || 0)}</td>
                          <td className="px-3 py-2 text-right font-tabular text-amber-300">${num(r.tarifa_leq || 0, 2)}</td>
                          <td className="px-3 py-2 text-right font-tabular font-semibold text-emerald-300">${num(r.cantidad_recaudo || 0)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                {(data.rows || []).length > 100 && (
                  <p className="text-xs text-white/40 mt-3 text-center">Mostrando primeros 100 de {num(data.total)} — usa Export CSV para todos</p>
                )}
              </Card>
            </>
          )}
        </div>
      );
    }

    // ====================================================
    // Upload tab (HU-DASH-2.3)
    // Drag-drop .xls/.xlsx → POST /upload-excel
    // ====================================================
    function UploadTab() {
      const [file, setFile] = useState(null);
      const [reportType, setReportType] = useState('ventas_detalladas');
      const [estacionId, setEstacionId] = useState('');
      const [dragOver, setDragOver] = useState(false);
      const [uploading, setUploading] = useState(false);
      const [result, setResult] = useState(null);
      const [err, setErr] = useState(null);
      const inputRef = useRef(null);

      const ALLOWED = ['.xls', '.xlsx'];

      const pickFile = (f) => {
        if (!f) return;
        const ext = (f.name.match(/\.[^.]+$/) || [''])[0].toLowerCase();
        if (!ALLOWED.includes(ext)) {
          setErr(new Error(`Solo se aceptan ${ALLOWED.join(' / ')} — recibido: ${ext || '(sin extensión)'}`));
          return;
        }
        if (f.size > 50 * 1024 * 1024) {
          setErr(new Error(`Archivo supera 50 MB (${(f.size / 1024 / 1024).toFixed(1)} MB)`));
          return;
        }
        setErr(null);
        setResult(null);
        setFile(f);
      };

      const onDrop = (e) => {
        e.preventDefault();
        setDragOver(false);
        if (e.dataTransfer?.files?.[0]) pickFile(e.dataTransfer.files[0]);
      };

      const submit = async (e) => {
        e.preventDefault();
        if (!file) return;
        setUploading(true); setErr(null); setResult(null);
        try {
          const fd = new FormData();
          fd.append('file', file);
          fd.append('report_type', reportType);
          if (estacionId) fd.append('estacion_id', estacionId);
          const res = await fetch(API_BASE + '/upload-excel', {
            method: 'POST', body: fd, credentials: 'same-origin',
          });
          if (res.status === 401) { window.location.reload(); return; }
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
          setResult(data);
          setFile(null);
          if (inputRef.current) inputRef.current.value = '';
        } catch (e) { setErr(e); }
        finally { setUploading(false); }
      };

      const inputCls = 'bg-azul-dark/50 border border-cyan-brand/20 text-white placeholder-white/30 px-3 py-2 rounded text-sm focus:border-cyan-brand/60 focus:outline-none';
      const fmtMB = (b) => (b / 1024 / 1024).toFixed(2);

      return (
        <div className="space-y-4">
          <Card title="Cargar reporte GasUp" subtitle="Excel (.xls / .xlsx) — max 50 MB">
            <form onSubmit={submit} className="space-y-4">
              <div
                onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={onDrop}
                onClick={() => inputRef.current?.click()}
                className={`border-2 border-dashed rounded-lg p-10 text-center cursor-pointer transition ${
                  dragOver
                    ? 'border-cyan-brand bg-cyan-brand/10'
                    : 'border-white/20 hover:border-cyan-brand/50 hover:bg-white/5'
                }`}
              >
                <input
                  ref={inputRef}
                  type="file"
                  accept=".xls,.xlsx"
                  className="hidden"
                  onChange={(e) => pickFile(e.target.files?.[0])}
                />
                {file ? (
                  <div>
                    <div className="font-display text-lg font-semibold text-white">{file.name}</div>
                    <div className="text-xs text-white/50 mt-1">{fmtMB(file.size)} MB · {file.type || 'Excel'}</div>
                    <div className="text-[11px] text-cyan-300 mt-2 uppercase tracking-wider">Click para cambiar</div>
                  </div>
                ) : (
                  <div>
                    <div className="text-4xl text-white/30 mb-2">↑</div>
                    <div className="font-display text-lg font-semibold text-white">Arrastra un archivo</div>
                    <div className="text-xs text-white/50 mt-1">o click para seleccionar · .xls / .xlsx</div>
                  </div>
                )}
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                  <label className="block text-[10px] uppercase tracking-wider text-white/50 mb-1 font-semibold">Tipo de reporte</label>
                  <select className={inputCls + ' w-full'} value={reportType} onChange={(e) => setReportType(e.target.value)}>
                    <option value="ventas_detalladas">ventas_detalladas</option>
                    <option value="recaudos_financiera">recaudos_financiera</option>
                  </select>
                </div>
                <div>
                  <label className="block text-[10px] uppercase tracking-wider text-white/50 mb-1 font-semibold">Estación (opcional)</label>
                  <select className={inputCls + ' w-full'} value={estacionId} onChange={(e) => setEstacionId(e.target.value)}>
                    <option value="">(auto-detectar)</option>
                    <option value="ECG-01">ECG-01 Nacozari</option>
                    <option value="ECG-02">ECG-02 Ojo Caliente</option>
                    <option value="ECG-03">ECG-03 Peñuelas</option>
                  </select>
                </div>
              </div>

              <div className="flex items-center gap-3">
                <button
                  type="submit"
                  disabled={!file || uploading}
                  className="bg-gradient-to-br from-cyan-brand to-verde-brand hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed text-azul-dark text-sm font-semibold py-2 px-5 rounded transition"
                >
                  {uploading ? 'Procesando…' : 'Subir y parsear'}
                </button>
                {file && !uploading && (
                  <button
                    type="button"
                    onClick={() => { setFile(null); if (inputRef.current) inputRef.current.value = ''; }}
                    className="text-sm text-white/60 hover:text-white/90 transition"
                  >
                    Cancelar
                  </button>
                )}
              </div>
            </form>
          </Card>

          {err && (
            <Card title="Error">
              <div className="text-sm text-red-300 font-mono">{String(err.message || err)}</div>
            </Card>
          )}

          {result && (
            <Card title="Resultado" subtitle={result.filename}>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                <div className="border-l-2 border-cyan-brand pl-3">
                  <div className="text-[10px] uppercase text-white/50 tracking-wider">Formato</div>
                  <div className="font-display text-sm font-semibold text-white mt-1">{result.detected_format}</div>
                </div>
                <div className="border-l-2 border-cyan-brand pl-3">
                  <div className="text-[10px] uppercase text-white/50 tracking-wider">Parseadas</div>
                  <div className="font-display text-2xl font-semibold text-white mt-1 font-tabular">{num(result.rows_parsed)}</div>
                </div>
                <div className="border-l-2 border-emerald-400 pl-3">
                  <div className="text-[10px] uppercase text-white/50 tracking-wider">Insertadas</div>
                  <div className="font-display text-2xl font-semibold text-emerald-300 mt-1 font-tabular">{num(result.rows_inserted)}</div>
                </div>
                <div className="border-l-2 border-amber-400 pl-3">
                  <div className="text-[10px] uppercase text-white/50 tracking-wider">Omitidas</div>
                  <div className="font-display text-2xl font-semibold text-amber-300 mt-1 font-tabular">{num(result.rows_skipped)}</div>
                </div>
              </div>
              {result.warnings && result.warnings.length > 0 && (
                <div className="mt-4 pt-4 border-t border-white/10">
                  <div className="text-[10px] uppercase text-amber-300 tracking-wider mb-2 font-semibold">Warnings</div>
                  <ul className="space-y-1 text-xs text-white/70">
                    {result.warnings.map((w, i) => (
                      <li key={i} className="pl-3 border-l border-amber-400/40">{w}</li>
                    ))}
                  </ul>
                </div>
              )}
            </Card>
          )}
        </div>
      );
    }

    // ====================================================
    // App
    // ====================================================
    function App() {
      const [tab, setTab] = useState('resumen');
      const [version, setVersion] = useState(null);
      const [searchOpen, setSearchOpen] = useState(false);
      const [stationModal, setStationModal] = useState(null);
      const [placaModal, setPlacaModal] = useState(null);

      useEffect(() => { apiGet('/health').then(d => setVersion(d.version)).catch(() => {}); }, []);

      // Cmd/Ctrl+K shortcut for search
      useEffect(() => {
        const handler = (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
            e.preventDefault();
            setSearchOpen(v => !v);
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      return (
        <div className="min-h-screen">
          <Header tab={tab} onTab={setTab} onSearch={() => setSearchOpen(true)} />
          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            {tab === 'resumen' && <ResumenTab onStationClick={setStationModal} onPlacaClick={setPlacaModal} />}
            {tab === 'txn' && <TxnTab />}
            {tab === 'sp' && <SobreprecioTab />}
            {tab === 'cmu' && <CmuTab />}
            {tab === 'retention' && <RetentionTab onPlacaClick={setPlacaModal} />}
            {tab === 'health' && <HealthTab onPlacaClick={setPlacaModal} />}
            {tab === 'upload' && <UploadTab />}
          </main>

          {/* Modals */}
          <StationModal station={stationModal} onClose={() => setStationModal(null)} onPlacaClick={setPlacaModal} />
          <PlacaModal placa={placaModal} onClose={() => setPlacaModal(null)} onStationClick={setStationModal} />
          <SearchOverlay open={searchOpen} onClose={() => setSearchOpen(false)} onPlacaClick={setPlacaModal} onStationClick={setStationModal} />

          <footer className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-[11px] text-white/30 text-center tracking-wider uppercase font-display">
            {version && <span>Central Gas Agent {version} · </span>}
            <a href="/docs" className="hover:text-cyan-300 transition">API Docs</a>
            <span className="mx-2 text-white/20">·</span>
            <a href="https://github.com/josuehernandeztapia/centralgas" className="hover:text-cyan-300 transition">GitHub</a>
            <span className="mx-2 text-white/20">·</span>
            <a href="https://centralgas.com.mx" className="hover:text-cyan-300 transition">centralgas.com.mx</a>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script>
    // PWA Service Worker registration (HU-DASH-X.4)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
  </script>
</body>
