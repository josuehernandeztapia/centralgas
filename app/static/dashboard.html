<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central Gas — Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛽</text></svg>" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#0D2B4E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Central Gas" />

  <!-- Brand fonts (same as centralgas.com.mx landing) -->
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            azul: '#0D2B4E',
            'azul-dark': '#081F3A',
            'azul-light': '#12355E',
            cyan: { brand: '#00AEEF' },
            verde: { brand: '#00C48C' },
          },
          fontFamily: {
            rajdhani: ['Rajdhani', 'sans-serif'],
            sans: ['DM Sans', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- React 18 UMD -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Recharts UMD -->
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <!-- Babel standalone for JSX in-browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --azul: #0D2B4E;
      --azul-dark: #081F3A;
      --azul-light: #12355E;
      --cyan: #00AEEF;
      --verde: #00C48C;
      --amber: #F59E0B;
      --rojo: #EF4444;
      --grid-alpha: .04;
      --grain-alpha: .035;
    }

    html, body {
      background: var(--azul);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* Grain overlay (identical to landing) */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
      opacity: .5;
    }
    /* Grid overlay */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,174,239,var(--grid-alpha)) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,174,239,var(--grid-alpha)) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    /* Glow blobs (subtle, animated — like landing but more discreet for dashboard) */
    .glow-a, .glow-b { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(130px); }
    .glow-a { width: 500px; height: 500px; background: rgba(0,174,239,.06); top: -80px; left: -80px;
              animation: drift-a 18s ease-in-out infinite alternate; }
    .glow-b { width: 380px; height: 380px; background: rgba(0,196,140,.04); bottom: -60px; right: -60px;
              animation: drift-b 14s ease-in-out infinite alternate; }
    @keyframes drift-a { to { transform: translate(50px, 35px); } }
    @keyframes drift-b { to { transform: translate(-35px, -25px); } }

    /* Relative z-index for content */
    #root { position: relative; z-index: 2; }

    /* Rajdhani for numeric displays and headers */
    .font-display { font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: .02em; }
    .font-tabular { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }

    /* Card glass effect */
    .card-glass {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0,174,239,0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .card-glass:hover {
      border-color: rgba(0,174,239,0.22);
    }

    /* KPI tint variants */
    .kpi-cyan   { background: linear-gradient(135deg, rgba(0,174,239,0.10), rgba(0,174,239,0.04)); border-color: rgba(0,174,239,.25); }
    .kpi-verde  { background: linear-gradient(135deg, rgba(0,196,140,0.10), rgba(0,196,140,0.04)); border-color: rgba(0,196,140,.25); }
    .kpi-amber  { background: linear-gradient(135deg, rgba(245,158,11,0.10), rgba(245,158,11,0.04)); border-color: rgba(245,158,11,.25); }
    .kpi-purple { background: linear-gradient(135deg, rgba(168,85,247,0.10), rgba(168,85,247,0.04)); border-color: rgba(168,85,247,.25); }

    /* Table */
    table thead { background: rgba(0,174,239,0.05); border-bottom: 1px solid rgba(0,174,239,0.18); }
    table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background .15s; }
    table tbody tr:hover { background: rgba(0,174,239,0.05); }

    /* Input overrides for dark theme */
    input, select { color-scheme: dark; }

    /* Tab button transitions */
    .tab-btn { transition: all .2s ease; }
    .tab-btn:hover { color: #fff; background: rgba(0,174,239,.08); }
    .tab-btn.active {
      background: linear-gradient(135deg, #00AEEF, #00C48C);
      color: #0D2B4E;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,174,239,.25);
    }

    /* Scrollbar (webkit) */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,.2); }
    ::-webkit-scrollbar-thumb { background: rgba(0,174,239,.2); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,174,239,.35); }

    /* ═══ LOGO — animaciones "venden" ═══ */
    /* Central node heartbeat */
    @keyframes node-pulse { 0%,100% { r: 7; opacity: 1 } 50% { r: 9.5; opacity: .55 } }
    /* Moving dashes along lines (signal flow inward) */
    @keyframes line-a { 0% { stroke-dashoffset: 40 } 100% { stroke-dashoffset: 0 } }
    @keyframes line-b { 0% { stroke-dashoffset: 30 } 100% { stroke-dashoffset: 0 } }
    /* Outer orbital nodes — each staggered so it feels alive */
    @keyframes orbit-pulse { 0%,100% { r: 4.5; opacity: .5 } 50% { r: 6; opacity: 1 } }
    /* Halo (outer ring) */
    @keyframes halo-ring { 0%,100% { opacity: .08; transform: scale(1) } 50% { opacity: .18; transform: scale(1.08) } }
    /* Full constellation slow rotation */
    @keyframes orbit-slow { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }
    /* Traveling signal ball along each axis */
    @keyframes signal-right { 0% { cx: 86; opacity: 0 } 10% { opacity: 1 } 90% { opacity: 1 } 100% { cx: 54; opacity: 0 } }
    @keyframes signal-left  { 0% { cx: 14; opacity: 0 } 10% { opacity: 1 } 90% { opacity: 1 } 100% { cx: 46; opacity: 0 } }
    @keyframes signal-top   { 0% { cy: 20; cx: 70; opacity: 0 } 10% { opacity: 1 } 90% { opacity: 1 } 100% { cy: 46; cx: 54; opacity: 0 } }
    @keyframes signal-bot   { 0% { cy: 80; cx: 70; opacity: 0 } 10% { opacity: 1 } 90% { opacity: 1 } 100% { cy: 54; cx: 54; opacity: 0 } }

    .nc  { animation: node-pulse 2.4s ease-in-out infinite; transform-origin: 50px 50px; transform-box: fill-box; }
    .la  { animation: line-a 1.8s linear infinite; }
    .lb  { animation: line-b 2.2s linear infinite; }

    .orbit-r { animation: orbit-pulse 2.6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .orbit-l { animation: orbit-pulse 2.6s ease-in-out .7s infinite; transform-origin: center; transform-box: fill-box; }
    .orbit-t { animation: orbit-pulse 3.0s ease-in-out 1.3s infinite; transform-origin: center; transform-box: fill-box; }
    .orbit-b { animation: orbit-pulse 2.8s ease-in-out 1.9s infinite; transform-origin: center; transform-box: fill-box; }

    .halo { animation: halo-ring 3.5s ease-in-out infinite; transform-origin: 50px 50px; transform-box: fill-box; }

    .constellation {
      animation: orbit-slow 90s linear infinite;
      transform-origin: 50px 50px;
      transform-box: fill-box;
      transition: filter .4s ease;
    }

    .signal-r { animation: signal-right 2.2s ease-in-out infinite; }
    .signal-l { animation: signal-left  2.2s ease-in-out .55s infinite; }
    .signal-t { animation: signal-top   2.2s ease-in-out 1.1s infinite; }
    .signal-b { animation: signal-bot   2.2s ease-in-out 1.65s infinite; }

    /* Logo container — hover effect: glow + speed up */
    .logo-wrap {
      display: inline-flex;
      filter: drop-shadow(0 0 0 rgba(0,174,239,0));
      transition: filter .4s ease, transform .4s ease;
      cursor: pointer;
    }
    .logo-wrap:hover { filter: drop-shadow(0 0 14px rgba(0,174,239,.55)); transform: scale(1.05); }
    .logo-wrap:hover .constellation { animation-duration: 20s; }
    .logo-wrap:hover .nc { animation-duration: 1s; }

    /* Loading pulse */
    .loading-pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .5 } }
  </style>
</head>
<body>
  <div class="glow-a"></div>
  <div class="glow-b"></div>

  <div id="root">
    <div class="min-h-screen flex items-center justify-center">
      <div class="text-white/40 text-lg loading-pulse">Cargando dashboard…</div>
    </div>
  </div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;
    const {
      LineChart, Line, BarChart, Bar, XAxis, YAxis, Tooltip, CartesianGrid,
      ResponsiveContainer, Legend, Cell,
    } = Recharts;

    // ====================================================
    // Brand palette (matches landing + Tailwind config)
    // ====================================================
    const BRAND = {
      azul: '#0D2B4E',
      azulDark: '#081F3A',
      azulLight: '#12355E',
      cyan: '#00AEEF',
      verde: '#00C48C',
      amber: '#F59E0B',
      rojo: '#EF4444',
      purple: '#A855F7',
    };

    // Chart palette in brand colors (cyan/verde rotating + accents)
    const CHART_COLORS = [
      BRAND.cyan, BRAND.verde, '#7DD3FC', '#86EFAC',
      BRAND.amber, BRAND.purple, '#F472B6', '#60A5FA', '#34D399', '#FBBF24',
    ];

    // ====================================================
    // Helpers
    // ====================================================
    const API_BASE = window.location.origin;

    const mxn = (n) => new Intl.NumberFormat('es-MX', {
      style: 'currency', currency: 'MXN', maximumFractionDigits: 0,
    }).format(n || 0);

    const num = (n, digits = 0) => new Intl.NumberFormat('es-MX', {
      maximumFractionDigits: digits,
    }).format(n || 0);

    const dtfmt = (iso) => {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        return d.toLocaleString('es-MX', {
          day: '2-digit', month: 'short', year: 'numeric',
          hour: '2-digit', minute: '2-digit', hour12: false,
        });
      } catch { return iso; }
    };

    const datefmt = (iso) => {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: '2-digit' });
      } catch { return iso; }
    };

    const prettifyMedio = (s) => {
      if (!s) return '—';
      const map = {
        'EFECTIVO': 'Efectivo', 'CREDITO': 'Crédito', 'CRÉDITO': 'Crédito',
        'TARJETA_DEBITO': 'Tarjeta Débito', 'TARJETA_DÉBITO': 'Tarjeta Débito',
        'TARJETA_CREDITO': 'Tarjeta Crédito', 'TARJETA_CRÉDITO': 'Tarjeta Crédito',
        'PREPAGO': 'Prepago', 'BONOS_EDS': 'Bonos EDS', 'DESCONOCIDO': 'Desconocido',
      };
      return map[s.toUpperCase()] || s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
    };

    const truncate = (s, n = 18) => {
      if (!s) return '—';
      return s.length > n ? s.slice(0, n - 1) + '…' : s;
    };

    // ====================================================
    // API client
    // ====================================================
    async function apiGet(path) {
      // credentials: 'same-origin' ensures the browser reuses the Basic auth
      // credentials cached after the /dashboard prompt for data endpoints.
      const res = await fetch(API_BASE + path, {
        headers: { 'Accept': 'application/json' },
        credentials: 'same-origin',
      });
      if (res.status === 401) {
        // Force a re-prompt by reloading — clears expired Basic auth cache on some browsers.
        window.location.reload();
        throw new Error('401 Unauthorized');
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text().catch(() => res.statusText)}`);
      return res.json();
    }

    // ====================================================
    // Recharts dark theme helpers
    // ====================================================
    const axisStyle = { tick: { fill: 'rgba(255,255,255,0.55)', fontSize: 11 }, axisLine: { stroke: 'rgba(0,174,239,0.18)' }, tickLine: { stroke: 'rgba(0,174,239,0.18)' } };
    const tooltipStyle = {
      contentStyle: { background: 'rgba(8,31,58,0.95)', border: '1px solid rgba(0,174,239,0.3)', borderRadius: '6px', color: '#fff', fontSize: '12px' },
      labelStyle: { color: 'rgba(255,255,255,0.7)', marginBottom: '4px' },
      itemStyle: { color: '#fff' },
      cursor: { fill: 'rgba(0,174,239,0.08)' },
    };

    // ====================================================
    // UI primitives (dark theme)
    // ====================================================
    function Card({ title, subtitle, children, className = '', titleAction }) {
      return (
        <div className={`card-glass rounded-lg p-5 ${className}`}>
          {title && (
            <div className="flex items-baseline justify-between mb-4">
              <h3 className="text-xs font-semibold uppercase tracking-[0.15em] text-white/70 font-display">{title}</h3>
              {subtitle && <span className="text-[11px] text-white/40">{subtitle}</span>}
              {titleAction}
            </div>
          )}
          {children}
        </div>
      );
    }

    function Kpi({ label, value, sub, variant = 'cyan' }) {
      const variantClass = {
        cyan:   'kpi-cyan   text-cyan-300',
        verde:  'kpi-verde  text-emerald-300',
        amber:  'kpi-amber  text-amber-300',
        purple: 'kpi-purple text-purple-300',
      }[variant];
      return (
        <div className={`rounded-lg border p-4 ${variantClass}`}>
          <div className="text-[10px] font-medium uppercase tracking-[0.18em] text-white/60">{label}</div>
          <div className="font-display text-3xl font-bold mt-1 font-tabular text-white">{value}</div>
          {sub && <div className="text-[11px] text-white/50 mt-1">{sub}</div>}
        </div>
      );
    }

    function LoadingBlock({ text = 'Cargando…' }) {
      return <div className="loading-pulse text-white/40 text-sm py-6 text-center">{text}</div>;
    }

    function ErrorBlock({ error }) {
      return (
        <div className="bg-red-500/10 border border-red-500/30 text-red-300 rounded p-3 text-sm">
          <strong>Error:</strong> {error.message || String(error)}
        </div>
      );
    }

    // ====================================================
    // Logo (constellation, same as landing)
    // ====================================================
    function Logo({ size = 36, animated = true }) {
      return (
        <span className="logo-wrap" style={{ width: size, height: size }}>
          <svg viewBox="0 0 100 100" width={size} height={size} style={{ overflow: 'visible' }} fill="none">
            {/* Outer halo ring — breathes */}
            <circle cx="50" cy="50" r="22" fill="none" stroke={BRAND.cyan} strokeWidth="1" className={animated ? 'halo' : ''} opacity=".1" />

            {/* Whole constellation rotates slowly */}
            <g className={animated ? 'constellation' : ''}>
              {/* Dashed connecting lines (from center to orbital nodes) */}
              <line x1="50" y1="50" x2="90" y2="50" stroke={BRAND.cyan}  strokeWidth="2"   strokeDasharray="7 4" className={animated ? 'la' : ''}/>
              <line x1="50" y1="50" x2="72" y2="16" stroke={BRAND.verde} strokeWidth="1.8" strokeDasharray="6 4" className={animated ? 'lb' : ''}/>
              <line x1="50" y1="50" x2="72" y2="84" stroke={BRAND.cyan}  strokeWidth="1.8" strokeDasharray="6 4" className={animated ? 'la' : ''}/>
              <line x1="50" y1="50" x2="10" y2="50" stroke={BRAND.verde} strokeWidth="1.8" strokeDasharray="6 4" className={animated ? 'lb' : ''}/>

              {/* Orbital nodes — staggered pulses */}
              <circle cx="90" cy="50" r="5.5" fill="white"       opacity=".2" className={animated ? 'orbit-r' : ''} />
              <circle cx="10" cy="50" r="4.5" fill={BRAND.verde} opacity=".6" className={animated ? 'orbit-l' : ''} />
              <circle cx="72" cy="16" r="4.5" fill={BRAND.cyan}  opacity=".6" className={animated ? 'orbit-t' : ''} />
              <circle cx="72" cy="84" r="4.5" fill={BRAND.cyan}  opacity=".6" className={animated ? 'orbit-b' : ''} />

              {/* Traveling signals — little dots moving from orbital nodes toward the center */}
              {animated && (
                <>
                  <circle r="1.6" fill={BRAND.cyan}  className="signal-r" cy="50" />
                  <circle r="1.4" fill={BRAND.verde} className="signal-l" cy="50" />
                  <circle r="1.4" fill={BRAND.cyan}  className="signal-t" />
                  <circle r="1.4" fill={BRAND.cyan}  className="signal-b" />
                </>
              )}
            </g>

            {/* Central hub — stays fixed so the rotation feels orbital */}
            <circle cx="50" cy="50" r="14"  fill="rgba(0,174,239,.08)"/>
            <circle cx="50" cy="50" r="13"  fill={BRAND.azul} stroke="rgba(0,174,239,.25)" strokeWidth="1"/>
            <circle cx="50" cy="50" r="7"   fill={BRAND.cyan} className={animated ? 'nc' : ''}/>
            <circle cx="50" cy="50" r="3.5" fill="white"/>
          </svg>
        </span>
      );
    }

    // ====================================================
    // Modal component
    // ====================================================
    function Modal({ open, onClose, title, children, wide }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-start justify-center pt-12 pb-8 overflow-y-auto" onClick={onClose}>
          <div className="fixed inset-0 bg-black/60 backdrop-blur-sm" />
          <div className={`relative bg-azul-dark border border-cyan-brand/20 rounded-xl shadow-2xl p-6 mx-4 ${wide ? 'max-w-5xl w-full' : 'max-w-3xl w-full'}`}
               onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-5">
              <h2 className="font-display text-lg font-bold text-white uppercase tracking-wider">{title}</h2>
              <button onClick={onClose} className="text-white/40 hover:text-white text-2xl leading-none">&times;</button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    // ====================================================
    // Station detail modal (HU-DASH-2.1)
    // ====================================================
    function StationModal({ station, onClose, onPlacaClick }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [err, setErr] = useState(null);

      useEffect(() => {
        if (!station) return;
        setLoading(true); setErr(null);
        apiGet('/api/stations/' + encodeURIComponent(station))
          .then(setData).catch(setErr).finally(() => setLoading(false));
      }, [station]);

      if (!station) return null;
      const kpis = data?.kpis || {};
      const byMonth = data?.by_month || [];
      const topPlacas = data?.top_placas || [];
      const heatmap = data?.heatmap || [];
      const byMedio = data?.by_medio || [];

      // Build heatmap grid 7 × 24
      const heatGrid = Array.from({ length: 7 }, () => Array(24).fill(0));
      let maxHeat = 1;
      heatmap.forEach(h => { heatGrid[h.dow][h.hora] = h.n; if (h.n > maxHeat) maxHeat = h.n; });
      const dayNames = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];

      return (
        <Modal open={!!station} onClose={onClose} title={station} wide>
          {loading && <LoadingBlock />}
          {err && <ErrorBlock error={err} />}
          {!loading && !err && data && (
            <div className="space-y-5">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                <Kpi label="Transacciones" value={num(kpis.total_txn)} variant="cyan" />
                <Kpi label="Litros totales" value={num(kpis.total_litros)} variant="verde" />
                <Kpi label="Revenue" value={mxn(kpis.total_mxn)} variant="purple" />
                <Kpi label="Placas únicas" value={num(kpis.placas_unicas)} variant="amber" />
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                {/* Monthly volume chart */}
                <Card title="Volumen mensual" subtitle={`${byMonth.length} meses`}>
                  {byMonth.length > 0 ? (
                    <ResponsiveContainer width="100%" height={200}>
                      <BarChart data={byMonth} margin={{ top: 5, right: 5, bottom: 5, left: 5 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,174,239,0.08)" />
                        <XAxis dataKey="mes" {...axisStyle} tick={{ ...axisStyle.tick, fontSize: 9 }} angle={-45} textAnchor="end" height={50} />
                        <YAxis {...axisStyle} />
                        <Tooltip {...tooltipStyle} />
                        <Bar dataKey="litros" name="LEQ" fill={BRAND.cyan} radius={[3, 3, 0, 0]} />
                      </BarChart>
                    </ResponsiveContainer>
                  ) : <div className="text-white/40 text-sm text-center py-8">Sin datos</div>}
                </Card>

                {/* Hourly heatmap */}
                <Card title="Heatmap por hora" subtitle="Intensidad de cargas">
                  <div className="overflow-x-auto">
                    <div className="grid gap-[2px]" style={{ gridTemplateColumns: 'auto ' + 'repeat(24, 1fr)' }}>
                      <div></div>
                      {Array.from({ length: 24 }, (_, h) => (
                        <div key={h} className="text-[8px] text-white/40 text-center">{h}</div>
                      ))}
                      {dayNames.map((day, di) => (
                        <React.Fragment key={di}>
                          <div className="text-[9px] text-white/50 pr-1 flex items-center">{day}</div>
                          {Array.from({ length: 24 }, (_, hi) => {
                            const val = heatGrid[di][hi];
                            const intensity = val / maxHeat;
                            const bg = val === 0 ? 'rgba(255,255,255,0.03)'
                              : `rgba(0,174,239,${0.15 + intensity * 0.7})`;
                            return <div key={hi} className="w-full aspect-square rounded-sm" title={`${day} ${hi}:00 — ${val} cargas`} style={{ background: bg, minWidth: 12 }} />;
                          })}
                        </React.Fragment>
                      ))}
                    </div>
                  </div>
                </Card>
              </div>

              {/* Top placas table */}
              <Card title="Top 20 placas" subtitle="por volumen">
                <div className="overflow-x-auto -mx-5">

    // ====================================================
    // Search overlay (HU-DASH-2.5)
    // ====================================================
    function SearchOverlay({ open, onClose, onPlacaClick, onStationClick }) {
      const [q, setQ] = useState('');
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const inputRef = useRef(null);

      useEffect(() => {
        if (open && inputRef.current) inputRef.current.focus();
        if (!open) { setQ(''); setResults([]); }
      }, [open]);

      useEffect(() => {
        if (q.length < 2) { setResults([]); return; }
        const timer = setTimeout(() => {
          setLoading(true);
          apiGet('/api/search?q=' + encodeURIComponent(q))
            .then(d => setResults(d.results || []))
            .catch(() => setResults([]))
            .finally(() => setLoading(false));
        }, 300);
        return () => clearTimeout(timer);
      }, [q]);

      const handleSelect = (r) => {
        onClose();
        if (r.type === 'placa') onPlacaClick(r.id);
        else if (r.type === 'estacion') onStationClick(r.id);
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Escape') onClose();
        if (e.key === 'Enter' && results.length > 0) handleSelect(results[0]);
      };

      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-start justify-center pt-[15vh]" onClick={onClose}>
          <div className="fixed inset-0 bg-black/50 backdrop-blur-sm" />
          <div className="relative w-full max-w-xl mx-4" onClick={e => e.stopPropagation()}>
            <div className="bg-azul-dark border border-cyan-brand/30 rounded-xl shadow-2xl overflow-hidden">
              <div className="flex items-center px-4 border-b border-white/10">
                <span className="text-white/40 mr-3 text-lg">&#x1F50D;</span>
                <input ref={inputRef} type="text" value={q} onChange={e => setQ(e.target.value)} onKeyDown={handleKeyDown}
                  placeholder="Buscar placa, conductor o estación…"
                  className="w-full bg-transparent text-white py-4 text-sm focus:outline-none placeholder-white/30" />
                <kbd className="text-[10px] text-white/30 border border-white/15 rounded px-1.5 py-0.5 ml-2">ESC</kbd>
              </div>
              {loading && <div className="text-white/40 text-sm text-center py-4 loading-pulse">Buscando…</div>}
              {!loading && q.length >= 2 && results.length === 0 && (
                <div className="text-white/40 text-sm text-center py-4">Sin resultados para "{q}"</div>
              )}
              {results.length > 0 && (
                <div className="max-h-[300px] overflow-y-auto">
                  {results.map((r, i) => (
                    <button key={i} onClick={() => handleSelect(r)}
                      className="w-full text-left px-4 py-3 hover:bg-white/5 transition flex items-center gap-3 border-b border-white/5 last:border-0">
                      <span className={`text-[10px] uppercase font-semibold tracking-wider px-1.5 py-0.5 rounded ${r.type === 'placa' ? 'bg-cyan-brand/20 text-cyan-300' : 'bg-verde-brand/20 text-emerald-300'}`}>
                        {r.type === 'placa' ? 'Placa' : 'Estación'}
                      </span>
                      <span className="text-white font-mono font-semibold">{r.label}</span>
                      <span className="text-white/50 text-xs truncate">{r.detail}</span>
                      <span className="text-white/30 text-xs ml-auto">{r.meta}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ====================================================
    // Health Score Tab
    // ====================================================
    function HealthTab({ onPlacaClick }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [err, setErr] = useState(null);
      const [filter, setFilter] = useState('');
      const [computing, setComputing] = useState(false);

      const fetchData = useCallback(async () => {
        setLoading(true); setErr(null);
        try {
          const url = '/api/health-scores' + (filter ? '?classification=' + filter : '');
          setData(await apiGet(url));
        } catch (e) { setErr(e); }
        finally { setLoading(false); }
      }, [filter]);

      useEffect(() => { fetchData(); }, [fetchData]);

      const doCompute = async () => {
        setComputing(true);
        try {
          const res = await fetch(API_BASE + '/api/health-scores/compute', {
            method: 'POST',
            headers: { 'Accept': 'application/json' },
            credentials: 'same-origin',
          });
          if (!res.ok) throw new Error(res.statusText);
          await fetchData();
        } catch (e) { alert('Error: ' + e.message); }
        finally { setComputing(false); }
      };

      const classColors = {
        saludable: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/40',
        atencion: 'bg-amber-500/20 text-amber-400 border-amber-500/40',
        en_riesgo: 'bg-orange-500/20 text-orange-400 border-orange-500/40',
        critico: 'bg-red-500/20 text-red-400 border-red-500/40',
      };
      const classLabels = { saludable: 'Saludable', atencion: 'Atención', en_riesgo: 'En riesgo', critico: 'Crítico' };

      const scoreBar = (score) => {
        const color = score >= 80 ? '#10b981' : score >= 60 ? '#f59e0b' : score >= 40 ? '#f97316' : '#ef4444';
        return (
          <div className="flex items-center gap-2 min-w-[120px]">
            <div className="flex-1 h-2 bg-white/10 rounded-full overflow-hidden">
              <div className="h-full rounded-full transition-all" style={{ width: score + '%', background: color }} />
            </div>
            <span className="text-xs font-mono font-bold" style={{ color }}>{score}</span>
          </div>
        );
      };

      const exportCsv = () => {
        if (!data?.rows?.length) return;
        const cols = ['placa', 'nombre', 'score_total', 'classification', 'dias_sin_cargar', 'cargas_90d', 'litros_90d', 'freq_score', 'volume_score', 'days_inactive_score', 'financial_score', 'loyalty_score', 'telefono'];
        const header = cols.join(',');
        const lines = data.rows.map(r => cols.map(c => '"' + String(r[c] || '').replace(/"/g, '""') + '"').join(','));
        const csv = '\uFEFF' + header + '\n' + lines.join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'health_scores.csv'; a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="space-y-4">
          {/* Controls */}
          <Card title="Health Score Engine">
            <div className="flex flex-wrap items-center gap-3">
              <button onClick={doCompute} disabled={computing}
                className="px-4 py-2 rounded text-sm font-semibold bg-gradient-to-br from-cyan-brand to-verde-brand text-azul-dark hover:opacity-90 transition disabled:opacity-40">
                {computing ? 'Calculando…' : '▶ Calcular scores ahora'}
              </button>
              <div className="h-6 w-px bg-white/10" />
              <span className="text-sm text-white/50">Filtrar:</span>
              {['', 'critico', 'en_riesgo', 'atencion', 'saludable'].map(f => (
                <button key={f} onClick={() => setFilter(f)}
                  className={`px-3 py-1.5 rounded text-xs font-semibold transition border ${filter === f
                    ? (f ? classColors[f] : 'bg-cyan-brand/20 text-cyan-300 border-cyan-brand/40')
                    : 'bg-white/5 text-white/50 hover:bg-white/10 border-white/10'}`}>
                  {f ? classLabels[f] : 'Todos'}
                </button>
              ))}
              {data?.latest_date && (
                <span className="ml-auto text-[11px] text-white/30">Último cálculo: {data.latest_date}</span>
              )}
            </div>
          </Card>

          {loading && <LoadingBlock />}
          {err && <ErrorBlock error={err} />}
          {!loading && !err && data && !data.latest_date && (
            <Card><p className="text-white/50 text-center py-8">No hay scores calculados aún. Presiona "Calcular scores ahora" para iniciar.</p></Card>

          {!loading && !err && data && data.latest_date && (
            <>
              {/* KPIs */}
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                <Kpi label="Score promedio" value={data.kpis.avg_score} sub={'de ' + data.kpis.total_placas + ' placas'} variant="cyan" />
                <Kpi label="Saludables" value={data.kpis.saludables}
                  sub={data.kpis.pct_saludables + '%'} variant="verde" />
                <Kpi label="En riesgo" value={data.kpis.en_riesgo}
                  sub={Math.round(100 * (data.kpis.en_riesgo || 0) / Math.max(data.kpis.total_placas, 1)) + '%'} variant="amber" />
                <Kpi label="Críticos" value={data.kpis.criticos}
                  sub={data.kpis.pct_criticos + '%'} variant={data.kpis.criticos > 0 ? 'amber' : 'cyan'} />
              </div>

              {/* Donut-style breakdown */}
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                {['saludable', 'atencion', 'en_riesgo', 'critico'].map(cls => {
                  const n = data.kpis[cls === 'en_riesgo' ? 'en_riesgo' : cls === 'atencion' ? 'atencion' : cls === 'critico' ? 'criticos' : 'saludables'] || 0;
                  const pct = Math.round(100 * n / Math.max(data.kpis.total_placas, 1));
                  return (
                    <button key={cls} onClick={() => setFilter(filter === cls ? '' : cls)}
                      className={`rounded-lg border p-3 text-center transition hover:scale-[1.02] ${filter === cls ? classColors[cls] + ' border-2' : 'bg-white/5 border-white/10 text-white/70'}`}>
                      <div className="text-2xl font-bold">{n}</div>
                      <div className="text-[11px] uppercase tracking-wider mt-1">{classLabels[cls]}</div>
                      <div className="text-[10px] text-white/40 mt-0.5">{pct}%</div>
                    </button>
                  );
                })}
              </div>

              {/* Table */}
              <Card
                title={filter ? classLabels[filter] : 'Todas las placas'}
                subtitle={data.total + ' resultados'}
                titleAction={
                  <button onClick={exportCsv} disabled={!data.rows.length}
                    className="text-[11px] font-semibold uppercase tracking-wider bg-cyan-brand/10 hover:bg-cyan-brand/20 border border-cyan-brand/40 text-cyan-300 px-3 py-1.5 rounded transition disabled:opacity-40">
                    ↓ Export CSV
                  </button>
                }
              >
                <div className="overflow-x-auto -mx-5">
                  <table className="min-w-full text-sm">
                    <thead>
                      <tr>
                        <th className="px-3 py-2 text-left text-white/70 text-[11px] uppercase">Placa</th>
                        <th className="px-3 py-2 text-left text-white/70 text-[11px] uppercase">Conductor</th>
                        <th className="px-3 py-2 text-center text-white/70 text-[11px] uppercase">Score</th>
                        <th className="px-3 py-2 text-center text-white/70 text-[11px] uppercase">Estado</th>
                        <th className="px-3 py-2 text-right text-white/70 text-[11px] uppercase">Días inactivo</th>
                        <th className="px-3 py-2 text-right text-white/70 text-[11px] uppercase">Cargas (90d)</th>
                        <th className="px-3 py-2 text-right text-white/70 text-[11px] uppercase">Litros (90d)</th>
                        <th className="px-3 py-2 text-left text-white/70 text-[11px] uppercase">Segmento</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-white/5">
                      {data.rows.map((r, i) => (
                        <tr key={i} className="hover:bg-white/5 cursor-pointer" onClick={() => onPlacaClick(r.placa)}>
                          <td className="px-3 py-2 font-mono text-cyan-300 font-semibold">{r.placa}</td>
                          <td className="px-3 py-2 text-white/80 text-xs truncate max-w-[160px]">{r.nombre || '—'}</td>
                          <td className="px-3 py-2">{scoreBar(r.score_total)}</td>
                          <td className="px-3 py-2 text-center">
                            <span className={`inline-block px-2 py-0.5 rounded text-[10px] font-bold uppercase border ${classColors[r.classification] || 'text-white/50'}`}>
                              {classLabels[r.classification] || r.classification}
                            </span>
                          </td>
                          <td className={`px-3 py-2 text-right font-tabular font-semibold ${r.dias_sin_cargar > 14 ? 'text-red-400' : r.dias_sin_cargar > 7 ? 'text-amber-400' : 'text-white/90'}`}>
                            {r.dias_sin_cargar}
                          </td>
                          <td className="px-3 py-2 text-right font-tabular text-white/90">{r.cargas_90d}</td>
                          <td className="px-3 py-2 text-right font-tabular text-white/90">{num(r.litros_90d)}</td>
                          <td className="px-3 py-2 text-white/60 text-xs">{r.segmento || '—'}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                {data.rows.length === 0 && (
                  <div className="text-white/40 text-sm text-center py-6">No hay placas en esta clasificación</div>
                )}
              </Card>
            </>
          )}
        </div>
      );
    }
