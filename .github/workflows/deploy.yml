name: Fly Deploy

# Triggers:
#   - Push to main → auto-deploy
#   - Manual dispatch → deploy on demand from GitHub UI
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_migration:
        description: "Run pending migrations after deploy?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

# Prevent overlapping deploys
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy app
        run: flyctl deploy --remote-only --app central-gas-agent
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for app to be reachable
        run: |
          for i in {1..30}; do
            if curl -fsS https://central-gas-agent.fly.dev/health > /dev/null; then
              echo "✅ App is healthy"
              curl -s https://central-gas-agent.fly.dev/health
              exit 0
            fi
            echo "Waiting for app... ($i/30)"
            sleep 5
          done
          echo "❌ App did not become healthy"
          exit 1

      - name: Smoke test — query stats (requires auth)
        env:
          DASH_USER: ${{ secrets.DASHBOARD_USER }}
          DASH_PASS: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          # /stats requires HTTP Basic auth (HU-DASH-X.1).
          # Verify 401 without creds, 200 + payload with creds.
          code=$(curl -s -o /dev/null -w '%{http_code}' https://central-gas-agent.fly.dev/stats)
          if [ "$code" != "401" ]; then
            echo "❌ Expected 401 without creds, got $code"
            exit 1
          fi
          echo "✅ Auth gate works (/stats returns 401 without creds)"

          if [ -z "$DASH_USER" ] || [ -z "$DASH_PASS" ]; then
            echo "⚠️  DASHBOARD_USER/PASSWORD not set in GH secrets — skipping authenticated check"
            exit 0
          fi
          response=$(curl -fsS -u "$DASH_USER:$DASH_PASS" https://central-gas-agent.fly.dev/stats)
          echo "$response" | head -c 500
          if ! echo "$response" | grep -q '"total_transactions"'; then
            echo "❌ /stats response missing expected field"
            exit 1
          fi
          echo "✅ Authenticated smoke test passed"

      - name: Run migrations (if requested)
        if: github.event.inputs.run_migration == 'true'
        run: |
          flyctl ssh console --app central-gas-agent --command "ls /app/scripts/migrate_*.py 2>/dev/null" || echo "no migrations"
          echo "Run migrations manually via:"
          echo "  flyctl ssh console --app central-gas-agent --command 'python3 /app/scripts/migrate_*.py'"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
